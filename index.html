<!DOCTYPE html>
<html lang="en" style="background-color: #000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Flower Garden For You</title>
    <style>
        html, body {
            background-color: #000;
            color-scheme: dark;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            transition: background 2.5s ease-in-out;
        }

        /* Twilight Background Overlay */
        #bg-viewport {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
            background-color: #000;
        }

        #special-bg {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center bottom;
            opacity: 0;
            transform: scale(1.08);
            transition: opacity 3.5s cubic-bezier(0.4, 0, 0.2, 1), transform 20s cubic-bezier(0.1, 1, 0.3, 1);
            will-change: opacity, transform;
        }

        #special-bg.active {
            opacity: 1;
            transform: scale(1.0);
        }
        
        #ui-top {
            position: absolute;
            top: 8%;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }
        h1 { font-size: 1.2rem; color: #ffb3c6; margin-bottom: 10px; font-weight: 400; letter-spacing: 1px; }
        h2 { font-size: 2.8rem; font-weight: 600; color: #fff; text-shadow: 0 0 20px rgba(255, 194, 209, 0.4); margin-bottom: 5px; }
        p { font-size: 1rem; color: #aaa; }

        #note-container {
            position: absolute;
            top: 9%;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0; 
            transition: opacity 1.5s ease-in-out;
            padding: 0 20px;
        }
        
        .romantic-note {
            font-size: 1.35rem;
            line-height: 1.8;
            color: #ffe5ec;
            font-weight: 300;
            text-shadow: 0 0 15px rgba(255, 179, 198, 0.4);
            font-style: italic;
            transition: all 1s ease-in-out;
        }

        #ui-bottom {
            position: absolute;
            bottom: 8%; 
            width: 100%;
            display: flex;
            gap: 15px;
            justify-content: center;
            z-index: 10;
            pointer-events: auto;
            transition: opacity 0.8s;
        }
        
        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            outline: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent !important;
        }
        button:hover, button:focus, button:active { 
            background: rgba(255, 255, 255, 0.15); 
            border-color: #ffb3c6; 
            box-shadow: 0 0 15px rgba(255, 179, 198, 0.3);
            outline: none;
            -webkit-tap-highlight-color: transparent !important;
        }

        #watermark {
            position: absolute;
            bottom: 2%;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.3);
            z-index: 11;
            cursor: pointer;
            pointer-events: auto;
            letter-spacing: 1px;
            user-select: none;
            outline: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent !important;
            transition: opacity 0.5s;
        }

        #secret-modal {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
        }
        .modal-content {
            background: rgba(20, 20, 20, 0.7);
            border: 1px solid rgba(255, 179, 198, 0.2);
            padding: 30px 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 340px;
        }
        .modal-content h3 {
            font-size: 1rem;
            color: #ffb3c6;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 400;
        }
        .modal-content input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .modal-content input:focus {
            border-color: #ffb3c6;
            box-shadow: 0 0 15px rgba(255, 179, 198, 0.2);
        }

        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            touch-action: none; 
            z-index: 3;
        }
    </style>
</head>
<body style="background-color: #000;">

    <div id="bg-viewport">
        <img id="special-bg" src="tree.jpg" alt="Ancient Sakura Tree">
    </div>

    <div id="ui-top">
        <h1>🌸 Flower Garden For You</h1>
        <p>Tap or Swipe Anywhere to</p>
        <h2>Plant Flowers</h2>
        <p>or turn on Auto Bloom</p>
    </div>

    <div id="note-container">
        <p id="main-note" class="romantic-note">
            Just wanted to leave a little corner of calm here.<br>
            Hope it made you smile, even if only for a minute. 🌸
        </p>
    </div>

    <div id="ui-bottom">
        <button id="clearBtn">Clear Garden</button>
        <button id="autoBloomBtn">▶ Auto Bloom</button>
    </div>

    <div id="watermark">Made By Manik~</div>

    <div id="secret-modal">
        <div class="modal-content">
            <h3>SECRET CODE</h3>
            <input type="text" id="secret-input" placeholder="[. TYPE HERE .]" autocomplete="off" autocapitalize="off">
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="dandelions.mp3" type="audio/mpeg">
    </audio>

    <canvas id="garden"></canvas>

    <script>
        const canvas = document.getElementById('garden');
        const ctx = canvas.getContext('2d');
        const specialBg = document.getElementById('special-bg');
        
        let width, height;
        let flowers = [];
        let vines = [];
        let fireflies = [];
        let dandelionSeeds = [];
        let cherryBlossoms = [];
        let autoBloomInterval = null;
        let time = 0;
        
        let isManyaMode = false;
        let isSpecialMode = false;
        let specialBlend = 0; // Smooth transition factor between 0.0 and 1.0
        let watermarkClicks = 0;
        let blossomRainActive = false;

        // Twilight Special Mode Sequence States
        const PHASE_NORMAL = 0;
        const PHASE_TRANSITION_IN = 1;
        const PHASE_GARDEN_BLOOM = 2;
        const PHASE_PART_FLOWERS = 3;
        const PHASE_NAME_AWAKEN = 4;
        const PHASE_SAND_DISSOLVE = 5;
        const PHASE_TIMELESS_HOLD = 6;
        const PHASE_EXIT_TRANSITION = 7;

        let currentPhase = PHASE_NORMAL;
        let phaseTimer = 0;

        let petals = [];
        let sandParticles = [];
        let nameLightDots = [];
        let diagonalDots = [];
        let engravingAlpha = 0;
        let engravingGlowIntensity = 0;

        const palettes = [
            { main: 'rgba(255, 126, 179, 0.8)', glow: '#ff7eb3' }, 
            { main: 'rgba(255, 185, 208, 0.8)', glow: '#ffb9d0' }, 
            { main: 'rgba(168, 230, 207, 0.8)', glow: '#a8e6cf' }, 
            { main: 'rgba(220, 175, 255, 0.8)', glow: '#dcafff' }, 
            { main: 'rgba(255, 211, 132, 0.8)', glow: '#ffd384' }  
        ];

        // Golden Palette for Twilight Mode
        const goldPalettes = [
            { main: 'rgba(251, 191, 36, 0.85)', glow: '#fbbf24' },
            { main: 'rgba(253, 224, 71, 0.85)', glow: '#fde047' },
            { main: 'rgba(245, 158, 11, 0.85)', glow: '#f59e0b' },
            { main: 'rgba(254, 240, 138, 0.85)', glow: '#fef08a' }
        ];

        let isMusicPlaying = false;
        const bgm = document.getElementById('bgm'); 
        bgm.volume = 0.5;

        function startMusic() {
            if (!isMusicPlaying) {
                bgm.play().then(() => {
                    isMusicPlaying = true;
                }).catch(err => console.log(err));
            }
        }
        window.addEventListener('touchstart', startMusic, { once: true });
        window.addEventListener('click', startMusic, { once: true });

        const preRenderedFlowers = [];
        const preRenderedGoldFlowers = [];
        const cacheSize = 250; 

        function initPreRenders() {
            const dpr = Math.min(window.devicePixelRatio || 1, 3); 
            
            palettes.forEach(palette => {
                for(let v = 0; v < 3; v++) {
                    const pCanvas = createPreRenderCanvas(palette, cacheSize, dpr);
                    preRenderedFlowers.push(pCanvas);
                }
            });

            goldPalettes.forEach(palette => {
                for(let v = 0; v < 3; v++) {
                    const pCanvas = createPreRenderCanvas(palette, cacheSize, dpr);
                    preRenderedGoldFlowers.push(pCanvas);
                }
            });
        }

        function createPreRenderCanvas(palette, size, dpr) {
            const pCanvas = document.createElement('canvas');
            pCanvas.width = size * dpr;
            pCanvas.height = size * dpr;
            const pCtx = pCanvas.getContext('2d');
            pCtx.scale(dpr, dpr);
            
            const center = size / 2;
            const petalCount = Math.floor(Math.random() * 3) + 5;
            const petalSize = Math.random() * 15 + 35; 

            pCtx.translate(center, center);
            pCtx.shadowBlur = 30; 
            pCtx.shadowColor = palette.glow;
            pCtx.globalCompositeOperation = 'screen';

            for (let layer = 0; layer < 2; layer++) {
                const layerScale = layer === 0 ? 1 : 0.6;
                const layerPetals = layer === 0 ? petalCount : petalCount - 1;
                pCtx.fillStyle = layer === 0 ? palette.main : '#ffffff';
                
                for (let i = 0; i < layerPetals; i++) {
                    pCtx.save();
                    pCtx.rotate((Math.PI * 2 / layerPetals) * i + (Math.PI / 4));
                    pCtx.scale(layerScale, layerScale);
                    
                    pCtx.beginPath();
                    pCtx.moveTo(0, 0);
                    pCtx.bezierCurveTo(-petalSize / 1.5, -petalSize / 2, -petalSize / 2, -petalSize, 0, -petalSize * 1.2);
                    pCtx.bezierCurveTo(petalSize / 2, -petalSize, petalSize / 1.5, -petalSize / 2, 0, 0);
                    pCtx.fill();
                    pCtx.restore();
                }
            }

            pCtx.beginPath();
            pCtx.arc(0, 0, 6, 0, Math.PI * 2);
            pCtx.fillStyle = '#fff9c4';
            pCtx.shadowBlur = 10;
            pCtx.shadowColor = '#fff9c4';
            pCtx.fill();

            return pCanvas;
        }

        initPreRenders();

        class CherryBlossom {
            constructor() {
                this.x = Math.random() * (window.innerWidth + 450) - 350;
                this.y = -20;
                this.size = Math.random() * 4 + 5;
                this.speedX = Math.random() * 0.6 + 0.3; 
                this.speedY = Math.random() * 1.2 + 0.8;
                this.wobble = Math.random() * Math.PI;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.wobble) * 0.4;
                this.wobble += this.wobbleSpeed;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.wobble);
                ctx.fillStyle = specialBlend > 0.3 ? 'rgba(253, 224, 71, 0.85)' : 'rgba(255, 182, 193, 0.85)';
                ctx.shadowBlur = 8;
                ctx.shadowColor = specialBlend > 0.3 ? '#f59e0b' : '#ffb3c6';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size / 1.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Firefly {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.size = Math.random() * 1.5 + 1;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.angle = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
            }
            update() {
                this.angle += this.wobbleSpeed;
                this.x += this.speedX + Math.sin(this.angle) * 0.2;
                this.y += this.speedY + Math.cos(this.angle) * 0.2;

                if (isSpecialMode && currentPhase >= PHASE_NAME_AWAKEN && currentPhase < PHASE_EXIT_TRANSITION) {
                    const targetX = width * 0.502;
                    const targetY = height * 0.765;
                    this.x += (targetX - this.x) * 0.002;
                    this.y += (targetY - this.y) * 0.002;
                }

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                let scaleMult = isManyaMode ? 2.2 : (1 + 1.2 * specialBlend);
                let currentScale = this.size * scaleMult;
                const pulse = (Math.sin(time * 0.04 + this.angle) + 1) * 0.5;

                ctx.beginPath();
                ctx.arc(this.x, this.y, currentScale * 4, 0, Math.PI * 2);
                ctx.fillStyle = isManyaMode ? 'rgba(255, 179, 198, 0.12)' : `rgba(254, 240, 138, ${0.08 + 0.04 * specialBlend})`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, currentScale, 0, Math.PI * 2);
                ctx.fillStyle = isManyaMode ? 'rgba(255, 105, 180, 0.9)' : `rgba(253, 224, 71, ${0.7 + 0.15 * specialBlend})`;
                ctx.fill();
                ctx.restore();
            }
        }

        class DandelionSeed {
            constructor() { this.reset(true); }
            reset(randomX = false) {
                this.x = randomX ? Math.random() * window.innerWidth : -50;
                this.y = Math.random() * (window.innerHeight * 0.8);
                this.size = Math.random() * 3 + 4;
                this.speedX = Math.random() * 0.5 + 0.4; 
                this.speedY = (Math.random() - 0.3) * 0.2; 
                this.wobble = Math.random() * 100;
                this.wobbleSpeed = Math.random() * 0.01 + 0.005;
            }
            update() {
                this.wobble += this.wobbleSpeed;
                this.x += this.speedX;
                this.y += this.speedY + Math.sin(this.wobble) * 0.15;
                if (this.x > width + 50 || this.y > height + 50) this.reset(false);
            }
            draw() {
                ctx.save();
                let strokeColor = isManyaMode ? 'rgba(255, 182, 193, 0.6)' : `rgba(${Math.round(255 - 1*specialBlend)}, ${Math.round(255 - 15*specialBlend)}, ${Math.round(255 - 117*specialBlend)}, ${0.4 + 0.2*specialBlend})`;
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = 1;
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.sin(this.wobble) * 0.1);
                ctx.beginPath();
                ctx.moveTo(0, 0); ctx.lineTo(-this.size, this.size); ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0,0); ctx.lineTo(this.size * 0.4, -this.size * 0.2);
                ctx.moveTo(0,0); ctx.lineTo(this.size * 0.2, -this.size * 0.4);
                ctx.moveTo(0,0); ctx.lineTo(-this.size * 0.2, -this.size * 0.4);
                ctx.stroke();
                ctx.restore();
            }
        }

        class SandParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 1.8 + 0.8;
                this.vx = Math.random() * 1.8 + 0.8; 
                this.vy = (Math.random() - 0.3) * 0.8;
                this.alpha = 1;
                this.decay = Math.random() * 0.012 + 0.006;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.fillStyle = `rgba(254, 215, 170, ${Math.max(0, this.alpha)})`;
                ctx.shadowBlur = 4;
                ctx.shadowColor = '#f59e0b';
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.restore();
            }
        }

        class NameLightDot {
            constructor(centerX, centerY) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 85 + 20;
                this.x = centerX + Math.cos(angle) * (distance * 1.35);
                this.y = centerY + Math.sin(angle) * (distance * 0.55);
                this.size = Math.random() * 1.6 + 0.8;
                this.vx = (Math.random() - 0.5) * 0.25;
                this.vy = (Math.random() - 0.5) * 0.25 - 0.05;
                this.alpha = 1;
                this.decay = Math.random() * 0.007 + 0.003;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.fillStyle = `rgba(254, 240, 138, ${Math.max(0, this.alpha)})`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#fbbf24';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class DiagonalLightDot {
            constructor(x, y) {
                this.x = x !== undefined ? x : Math.random() * (width * 1.2) - (width * 0.2);
                this.y = y !== undefined ? y : Math.random() * (height * 1.2);
                this.size = Math.random() * 2.2 + 1.0;
                this.vx = Math.random() * 2.5 + 1.8;
                this.vy = -(Math.random() * 1.8 + 1.0);
                this.alpha = 1;
                this.decay = Math.random() * 0.008 + 0.004;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.fillStyle = `rgba(254, 240, 138, ${Math.max(0, this.alpha)})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fbbf24';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            const dpr = Math.min(window.devicePixelRatio || 1, 3);
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = `${window.innerWidth}px`;
            canvas.style.height = `${window.innerHeight}px`;
            ctx.scale(dpr, dpr);
            width = window.innerWidth;
            height = window.innerHeight;
            if(fireflies.length === 0) {
                fireflies = Array.from({ length: 30 }, () => new Firefly());
                dandelionSeeds = Array.from({ length: 15 }, () => new DandelionSeed());
            }
        }
        window.addEventListener('resize', resize);
        resize();

        function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

        class Flower {
            constructor(x, y, forcedPink = false, isGold = false, scaleFactor = 1.0) {
                this.startX = x;
                this.targetY = y;
                this.baseY = height + 50; 
                this.maxHeight = this.baseY - y;
                this.stemProgress = 0;
                this.bloomProgress = 0;
                
                this.alpha = 1;
                this.dissolving = false;
                this.driftX = 0;
                this.driftY = 0;
                this.partOffsetX = 0;
                this.partOffsetY = 0;

                this.fallSpeedY = Math.random() * 1.2 + 0.6;
                this.fallSpeedX = Math.random() * 0.6 + 0.4; 
                this.rotSpeed = (Math.random() - 0.5) * 0.03;
                this.scaleFactor = scaleFactor;
                
                this.isPink = forcedPink || isManyaMode;
                this.isGold = isGold || isSpecialMode;

                if (this.isGold) {
                    this.cachedImage = preRenderedGoldFlowers[Math.floor(Math.random() * preRenderedGoldFlowers.length)];
                } else if (this.isPink) {
                    this.cachedImage = preRenderedFlowers[Math.floor(Math.random() * 6)]; 
                } else {
                    this.cachedImage = preRenderedFlowers[Math.floor(Math.random() * preRenderedFlowers.length)];
                }
                this.swayOffset = Math.random() * 1000;
                this.swaySpeed = Math.random() * 0.02 + 0.01;
                this.staticRotation = Math.random() * Math.PI * 2; 
            }
            update() {
                if (isSpecialMode && currentPhase >= PHASE_PART_FLOWERS && currentPhase < PHASE_SAND_DISSOLVE) {
                    const hollowX = width * 0.502;
                    const hollowY = height * 0.765;
                    const dx = this.startX - hollowX;
                    const dy = this.targetY - hollowY;
                    const dist = Math.hypot(dx, dy);

                    if (dist < 180 && dist > 1) {
                        const pushForce = (180 - dist) / 180;
                        const angle = Math.atan2(dy, dx);
                        this.partOffsetX += Math.cos(angle) * pushForce * 0.6;
                        this.partOffsetY += Math.sin(angle) * pushForce * 0.3;
                    }
                }

                if (this.dissolving) {
                    this.alpha -= 0.01;
                    this.driftX += this.fallSpeedX;
                    this.driftY += this.fallSpeedY;
                    this.staticRotation += this.rotSpeed;
                } else {
                    if (this.stemProgress < 1) this.stemProgress += 0.015;
                    else if (this.bloomProgress < 1) this.bloomProgress += 0.008;
                }
            }
            draw() {
                const currentHeight = this.maxHeight * easeOut(this.stemProgress);
                const sway = Math.sin(time * this.swaySpeed + this.swayOffset) * 20 * (currentHeight / this.maxHeight);
                const headX = this.startX + sway + this.partOffsetX;
                const headY = this.baseY - currentHeight + this.partOffsetY;

                ctx.save();
                if (this.dissolving) {
                    ctx.globalAlpha = Math.max(0, this.alpha * 2.5 - 1.5); 
                }
                ctx.beginPath();
                ctx.moveTo(this.startX + this.partOffsetX, this.baseY);
                ctx.quadraticCurveTo(this.startX + this.partOffsetX, this.baseY - currentHeight / 2, headX, headY);
                
                const stemGradient = ctx.createLinearGradient(this.startX, this.baseY, headX, headY);
                if (this.isGold) {
                    stemGradient.addColorStop(0, '#3b2005');
                    stemGradient.addColorStop(1, '#f59e0b');
                } else if (this.isPink) {
                    stemGradient.addColorStop(0, '#3a111c'); 
                    stemGradient.addColorStop(1, '#ff85a2'); 
                } else {
                    stemGradient.addColorStop(0, '#1a4a2b');
                    stemGradient.addColorStop(1, '#4ade80');
                }
                
                ctx.strokeStyle = stemGradient;
                ctx.lineWidth = (4 * easeOut(this.stemProgress)) * this.scaleFactor;
                ctx.lineCap = 'round';
                ctx.stroke();
                ctx.restore();

                if (this.stemProgress >= 0.5) {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, this.alpha);
                    if (this.dissolving) {
                        ctx.translate(headX + this.driftX, headY + this.driftY);
                    } else {
                        ctx.translate(headX, headY);
                    }
                    ctx.rotate(this.staticRotation); 
                    const drawSize = (cacheSize * easeOut(this.bloomProgress)) * this.scaleFactor;
                    ctx.drawImage(this.cachedImage, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
                    ctx.restore();
                }
            }
        }

        class Vine {
            constructor(startX, startY) {
                this.points = [{x: startX, y: startY}];
                this.blooms = [];
                this.alpha = 1;
                this.dissolving = false;
                this.isPink = isManyaMode;
                this.isGold = isSpecialMode;
                this.lastBloomPoint = {x: startX, y: startY};
                this.lastDrawPoint = {x: startX, y: startY};
            }
            addPoint(x, y) {
                const dx = x - this.lastDrawPoint.x;
                const dy = y - this.lastDrawPoint.y;
                const distToLast = Math.sqrt(dx*dx + dy*dy);
                
                if (distToLast > 12) {
                    this.points.push({x, y});
                    this.lastDrawPoint = {x, y};
                    const bx = x - this.lastBloomPoint.x;
                    const by = y - this.lastBloomPoint.y;
                    const distToBloom = Math.sqrt(bx*bx + by*by);
                    
                    if (distToBloom > 70) {
                        let cImg;
                        if (this.isGold) {
                            cImg = preRenderedGoldFlowers[Math.floor(Math.random() * preRenderedGoldFlowers.length)];
                        } else if (this.isPink) {
                            cImg = preRenderedFlowers[Math.floor(Math.random() * 6)];
                        } else {
                            cImg = preRenderedFlowers[Math.floor(Math.random() * preRenderedFlowers.length)];
                        }

                        this.blooms.push({
                            x: x, y: y, progress: 0,
                            driftX: 0, driftY: 0, alpha: 1,
                            fallX: Math.random() * 0.6 + 0.4,
                            fallY: Math.random() * 1.2 + 0.6,
                            rotSpeed: (Math.random() - 0.5) * 0.03,
                            cachedImage: cImg,
                            rotation: Math.random() * Math.PI * 2
                        });
                        this.lastBloomPoint = {x, y};
                    }
                }
            }
            update() {
                if (this.dissolving) {
                    this.alpha -= 0.015; 
                }
                this.blooms.forEach(b => {
                    if (this.dissolving) {
                        b.alpha -= 0.007;
                        b.driftX += b.fallX;
                        b.driftY += b.fallY;
                        b.rotation += b.rotSpeed;
                    } else {
                        if (b.progress < 1) b.progress += 0.015;
                    }
                });
            }
            draw() {
                if (this.points.length < 2) return;
                
                ctx.save();
                if (this.dissolving) {
                    ctx.globalAlpha = Math.max(0, this.alpha);
                }
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for(let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                
                let strokeC = this.isGold ? '#fcd34d' : (this.isPink ? '#ff85a2' : '#4ade80');
                ctx.strokeStyle = strokeC;
                ctx.shadowColor = strokeC;
                ctx.shadowBlur = 10;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                ctx.restore();

                this.blooms.forEach(b => {
                    const bloomEase = easeOut(b.progress);
                    if (bloomEase > 0.01) {
                        ctx.save();
                        ctx.globalAlpha = Math.max(0, b.alpha);
                        ctx.translate(b.x + b.driftX, b.y + b.driftY);
                        ctx.rotate(b.rotation);
                        const drawSize = cacheSize * bloomEase * 0.8; 
                        ctx.drawImage(b.cachedImage, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
                        ctx.restore();
                    }
                });
            }
        }

        function drawTreeCarvingGlow() {
            const hollowX = width * 0.502;
            const hollowY = height * 0.765;

            if (currentPhase >= PHASE_NAME_AWAKEN && currentPhase < PHASE_EXIT_TRANSITION && Math.random() < 0.45) {
                nameLightDots.push(new NameLightDot(hollowX, hollowY));
            }

            if (engravingAlpha <= 0) return;

            ctx.save();
            ctx.globalCompositeOperation = 'screen';

            const radGrad = ctx.createRadialGradient(hollowX, hollowY, 0, hollowX, hollowY, 120);
            const intensity = (0.6 + Math.sin(time * 0.035) * 0.15) * engravingGlowIntensity;
            radGrad.addColorStop(0, `rgba(254, 240, 138, ${0.52 * engravingAlpha * intensity})`);
            radGrad.addColorStop(0.45, `rgba(245, 158, 11, ${0.28 * engravingAlpha * intensity})`);
            radGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = radGrad;
            ctx.beginPath();
            ctx.arc(hollowX, hollowY, 120, 0, Math.PI * 2);
            ctx.fill();

            ctx.font = 'italic 300 21px Georgia, "Times New Roman", serif';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#f59e0b';
            ctx.shadowBlur = 18 * intensity;
            ctx.fillStyle = `rgba(255, 248, 220, ${0.92 * engravingAlpha})`;
            ctx.fillText("Avi  ♥  Sanjana", hollowX, hollowY + 6);

            ctx.restore();
        }

        function triggerExitToStandard() {
            if (currentPhase === PHASE_EXIT_TRANSITION) return;
            currentPhase = PHASE_EXIT_TRANSITION;
            phaseTimer = 0;
            blossomRainActive = false; // Stop spawning new special blossoms

            diagonalDots = [];
            for (let i = 0; i < 160; i++) {
                const x = Math.random() * (width * 1.2) - (width * 0.2);
                const y = Math.random() * (height * 1.2);
                diagonalDots.push(new DiagonalLightDot(x, y));
            }

            flowers.forEach(f => {
                f.dissolving = true;
                f.fallSpeedX = Math.max(f.fallSpeedX, 2.0);
                f.fallSpeedY = -Math.abs(f.fallSpeedY * 0.8);
            });
            vines.forEach(v => v.dissolving = true);

            specialBg.classList.remove('active');

            document.body.style.background = 'radial-gradient(circle at center, #111 0%, #000 100%)';
            mainNote.innerHTML = "Just wanted to leave a little corner of calm here.<br>Hope it made you smile, even if only for a minute. 🌸";
            mainNote.style.color = '#ffe5ec';
            mainNote.style.textShadow = '0 0 15px rgba(255, 179, 198, 0.3)';

            uiTop.style.opacity = '1';
            uiBottom.style.opacity = '1';
            watermark.style.opacity = '1';
            noteContainer.style.opacity = '0';
        }

        function animate() {
            ctx.clearRect(0, 0, width, height); 
            time++;

            // Smooth Blend Factor Management
            if (isSpecialMode && currentPhase !== PHASE_EXIT_TRANSITION) {
                if (specialBlend < 1) specialBlend += 0.015;
            } else {
                if (specialBlend > 0) specialBlend -= 0.01;
            }

            if (isSpecialMode) {
                phaseTimer++;

                if (currentPhase === PHASE_TRANSITION_IN && phaseTimer > 150) {
                    currentPhase = PHASE_GARDEN_BLOOM;
                    phaseTimer = 0;
                    spawnNaturalFieldBlooms();
                }

                if (currentPhase === PHASE_GARDEN_BLOOM && phaseTimer > 360) {
                    currentPhase = PHASE_PART_FLOWERS;
                    phaseTimer = 0;
                }

                if (currentPhase === PHASE_PART_FLOWERS && phaseTimer > 180) {
                    currentPhase = PHASE_NAME_AWAKEN;
                    phaseTimer = 0;
                }

                if (currentPhase === PHASE_NAME_AWAKEN) {
                    if (engravingAlpha < 1.0) engravingAlpha += 0.01;
                    if (engravingGlowIntensity < 1.0) engravingGlowIntensity += 0.012;

                    noteContainer.style.opacity = Math.max(0.35, (1.0 - engravingAlpha * 0.65)).toFixed(2);

                    if (phaseTimer > 360) {
                        currentPhase = PHASE_SAND_DISSOLVE;
                        phaseTimer = 0;

                        flowers.forEach(f => {
                            f.dissolving = true;
                            for(let p = 0; p < 8; p++) {
                                sandParticles.push(new SandParticle(f.startX + (Math.random()-0.5)*15, f.targetY + (Math.random()-0.5)*15));
                            }
                        });
                        vines.forEach(v => v.dissolving = true);
                    }
                }

                if (currentPhase === PHASE_SAND_DISSOLVE && phaseTimer > 270) {
                    currentPhase = PHASE_TIMELESS_HOLD;
                    phaseTimer = 0;
                }

                if (currentPhase === PHASE_TIMELESS_HOLD) {
                    engravingGlowIntensity = 0.72 + Math.sin(time * 0.035) * 0.18;
                }

                if (currentPhase === PHASE_EXIT_TRANSITION) {
                    if (engravingAlpha > 0) engravingAlpha -= 0.015;
                    if (engravingGlowIntensity > 0) engravingGlowIntensity -= 0.015;

                    diagonalDots.forEach(dd => { dd.update(); dd.draw(); });
                    diagonalDots = diagonalDots.filter(dd => dd.alpha > 0);

                    if (phaseTimer > 180 && diagonalDots.length === 0 && specialBlend === 0) {
                        isSpecialMode = false;
                        currentPhase = PHASE_NORMAL;
                        sandParticles = [];
                        nameLightDots = [];
                    }
                }
            }

            flowers = flowers.filter(f => !f.dissolving || f.alpha > 0);
            vines = vines.filter(v => !v.dissolving || v.alpha > 0);

            if (isSpecialMode) {
                sandParticles.forEach(sp => { sp.update(); sp.draw(); });
                sandParticles = sandParticles.filter(sp => sp.alpha > 0);

                nameLightDots.forEach(ld => { ld.update(); ld.draw(); });
                nameLightDots = nameLightDots.filter(ld => ld.alpha > 0);
            }

            fireflies.forEach(f => { f.update(); f.draw(); });
            flowers.forEach(flower => { flower.update(); flower.draw(); });
            vines.forEach(vine => { vine.update(); vine.draw(); });
            
            if (blossomRainActive || cherryBlossoms.length > 0) {
                if (blossomRainActive && time % 8 === 0 && cherryBlossoms.length < 100) {
                    cherryBlossoms.push(new CherryBlossom());
                }
                cherryBlossoms.forEach((c, index) => {
                    c.update();
                    c.draw();
                    if (c.y > height + 20 || c.x > width + 40) cherryBlossoms.splice(index, 1);
                });
            }

            if (isSpecialMode) {
                drawTreeCarvingGlow();
            }

            dandelionSeeds.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }

        const uiTop = document.getElementById('ui-top');
        const uiBottom = document.getElementById('ui-bottom');
        const noteContainer = document.getElementById('note-container');
        const watermark = document.getElementById('watermark');
        const mainNote = document.getElementById('main-note');
        const secretModal = document.getElementById('secret-modal');
        const secretInput = document.getElementById('secret-input');

        function revealSecretNote() {
            uiTop.style.opacity = '0';          
            noteContainer.style.opacity = '1';  
            uiBottom.style.opacity = '0.1';     
            watermark.style.opacity = '0.1';
        }

        function spawnNaturalFieldBlooms() {
            const totalFieldCount = 110;
            for (let i = 0; i < totalFieldCount; i++) {
                setTimeout(() => {
                    if (!isSpecialMode) return;
                    const fieldX = Math.random() * (width * 0.96) + (width * 0.02);
                    const depthFactor = Math.random();
                    const fieldY = height - (depthFactor * (height * 0.38) + 40);
                    const scaleFactor = 0.42 + (depthFactor * 0.48);

                    flowers.push(new Flower(fieldX, fieldY, false, true, scaleFactor));
                }, i * 60);
            }
        }

        function activateUltimateManyaMode() {
            isManyaMode = true;
            isSpecialMode = false;
            specialBg.classList.remove('active');
            blossomRainActive = true;
            
            document.body.style.background = 'radial-gradient(circle at center, #3a111c 0%, #050002 100%)';
            mainNote.innerHTML = `Some gardens bloom for everyone...<br>This little one was always waiting for you, Manya. 🌸`;
            mainNote.style.color = '#ffb3c6';
            mainNote.style.textShadow = '0 0 25px rgba(255, 179, 198, 0.6)';
            revealSecretNote();

            flowers.forEach(f => {
                f.cachedImage = preRenderedFlowers[Math.floor(Math.random() * 6)];
                f.isPink = true;
                f.isGold = false;
            });
            vines.forEach(v => {
                v.isPink = true;
                v.isGold = false;
                v.blooms.forEach(b => b.cachedImage = preRenderedFlowers[Math.floor(Math.random() * 6)]);
            });

            const totalHeartFlowers = 45;
            for (let i = 0; i < totalHeartFlowers; i++) {
                setTimeout(() => {
                    if (!isManyaMode) return;
                    const t = (Math.PI * 2 / totalHeartFlowers) * i;
                    const heartX = 16 * Math.pow(Math.sin(t), 3);
                    const heartY = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    
                    const scaleFactor = Math.min(width, height) * 0.024;
                    const targetCanvasX = width / 2 + (heartX * scaleFactor);
                    const targetCanvasY = height * 0.48 - (heartY * scaleFactor);

                    flowers.push(new Flower(targetCanvasX, targetCanvasY, true));
                }, i * 130);
            }

            for(let j = 0; j < 50; j++) {
                setTimeout(() => {
                    if (!isManyaMode) return;
                    const rX = Math.random() * width;
                    const rY = height - (Math.random() * (height * 0.45) + 120);
                    flowers.push(new Flower(rX, rY, true));
                }, j * 80 + 2000);
            }

            setTimeout(() => {
                blossomRainActive = false;
                document.body.style.background = 'radial-gradient(circle at center, #111 0%, #000 100%)';
                
                mainNote.innerHTML = "Just wanted to leave a little corner of calm here.<br>Hope it made you smile, even if only for a minute. 🌸";
                mainNote.style.color = '#ffe5ec';
                mainNote.style.textShadow = '0 0 15px rgba(255, 179, 198, 0.3)';
                
                uiTop.style.opacity = '1';
                uiBottom.style.opacity = '1';
                watermark.style.opacity = '1';
                noteContainer.style.opacity = '0';
                
                flowers.forEach(f => f.dissolving = true);
                vines.forEach(v => v.dissolving = true);
                
                isManyaMode = false;
                cherryBlossoms = [];
            }, 15000);
        }

        function activateSpecialMode() {
            isSpecialMode = true;
            isManyaMode = false;
            currentPhase = PHASE_TRANSITION_IN;
            phaseTimer = 0;
            engravingAlpha = 0;
            engravingGlowIntensity = 0;
            blossomRainActive = true;

            flowers.forEach(f => f.dissolving = true);
            vines.forEach(v => v.dissolving = true);

            specialBg.classList.add('active');

            mainNote.innerHTML = `Some flowers bloom because of sunlight.<br>Some bloom because they found each other. ✨`;
            mainNote.style.color = '#fef08a';
            mainNote.style.textShadow = '0 0 22px rgba(254, 240, 138, 0.5)';
            revealSecretNote();
        }

        watermark.addEventListener('click', () => {
            watermarkClicks++;
            if (watermarkClicks === 3) {
                watermarkClicks = 0;
                secretModal.style.opacity = '1';
                secretModal.style.pointerEvents = 'auto';
                secretInput.focus();
            }
        });

        secretModal.addEventListener('click', (e) => {
            if (e.target === secretModal) {
                secretModal.style.opacity = '0';
                secretModal.style.pointerEvents = 'none';
                secretInput.blur();
                secretInput.value = '';
            }
        });

        secretInput.addEventListener('input', () => {
            const val = secretInput.value.toLowerCase().replace(/\s+/g, '');
            if (val === 'manya') {
                secretInput.blur(); 
                secretModal.style.opacity = '0';
                secretModal.style.pointerEvents = 'none';
                secretInput.value = '';
                startMusic();
                activateUltimateManyaMode();
            } else if (val === 'sanju&avi' || val === 'avi&sanju' || val === 'sanjana&avi' || val === 'avi&sanjana') {
                secretInput.blur(); 
                secretModal.style.opacity = '0';
                secretModal.style.pointerEvents = 'none';
                secretInput.value = '';
                startMusic();
                activateSpecialMode();
            }
        });

        let isDrawing = false;
        let currentVine = null;
        let startPos = {x: 0, y: 0};

        canvas.addEventListener('pointerdown', (e) => {
            startMusic(); 
            revealSecretNote();
            isDrawing = true;
            startPos = {x: e.clientX, y: e.clientY};

            if (isSpecialMode && (currentPhase === PHASE_NAME_AWAKEN || currentPhase === PHASE_SAND_DISSOLVE || currentPhase === PHASE_TIMELESS_HOLD)) {
                const hollowX = width * 0.502;
                const hollowY = height * 0.765;
                const dx = e.clientX - hollowX;
                const dy = e.clientY - hollowY;

                if (Math.hypot(dx, dy) < 110) {
                    triggerExitToStandard();
                    return;
                }
            }

            currentVine = new Vine(e.clientX, e.clientY);
            vines.push(currentVine);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing || currentPhase === PHASE_EXIT_TRANSITION) return;
            if (currentVine) currentVine.addPoint(e.clientX, e.clientY);
        });

        window.addEventListener('pointerup', (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            const dx = e.clientX - startPos.x;
            const dy = e.clientY - startPos.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < 10 && currentPhase !== PHASE_EXIT_TRANSITION) {
                if (currentVine) vines.pop(); 
                flowers.push(new Flower(e.clientX, e.clientY)); 
            }
            currentVine = null;
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            flowers = [];
            vines = []; 
            sandParticles = [];
            nameLightDots = [];
            diagonalDots = [];
            isManyaMode = false;
            isSpecialMode = false;
            currentPhase = PHASE_NORMAL;
            engravingAlpha = 0;
            engravingGlowIntensity = 0;
            specialBg.classList.remove('active');
            blossomRainActive = false;
            cherryBlossoms = [];
            
            document.body.style.background = 'radial-gradient(circle at center, #111 0%, #000 100%)';
            uiTop.style.opacity = '1';
            noteContainer.style.opacity = '0';
            uiBottom.style.opacity = '1';
            watermark.style.opacity = '1';
        });

        document.getElementById('autoBloomBtn').addEventListener('click', (e) => {
            startMusic(); 
            revealSecretNote();
            const btn = e.target;
            if (autoBloomInterval) {
                clearInterval(autoBloomInterval);
                autoBloomInterval = null;
                btn.innerText = '▶ Auto Bloom';
                btn.style.color = '#fff';
            } else {
                btn.innerText = '⏸ Stop Bloom';
                btn.style.color = '#ffb3c6';
                autoBloomInterval = setInterval(() => {
                    const randomX = Math.random() * width;
                    const randomY = height - (Math.random() * (height * 0.5) + 150);
                    flowers.push(new Flower(randomX, randomY));
                }, 500); 
            }
        });

        animate();
    </script>
</body>
