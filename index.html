<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Garden For You</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        #ui-top {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }
        h1 { font-size: 1.2rem; color: #ffb3c6; margin-bottom: 10px; font-weight: 400; letter-spacing: 1px; }
        h2 { font-size: 2.8rem; font-weight: 600; color: #fff; text-shadow: 0 0 20px rgba(255, 194, 209, 0.4); margin-bottom: 5px; }
        p { font-size: 1rem; color: #aaa; }

        #note-container {
            position: absolute;
            top: 14%;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0; 
            transition: opacity 1.5s ease-in-out;
            padding: 0 20px;
        }
        .romantic-note {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #ffe5ec;
            font-weight: 300;
            text-shadow: 0 0 15px rgba(255, 179, 198, 0.3);
            font-style: italic;
        }

        #ui-bottom {
            position: absolute;
            bottom: 8%; 
            width: 100%;
            display: flex;
            gap: 15px;
            justify-content: center;
            z-index: 10;
            pointer-events: auto;
            transition: opacity 0.8s;
        }
        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        button:hover { background: rgba(255, 255, 255, 0.15); border-color: #ffb3c6; box-shadow: 0 0 15px rgba(255, 179, 198, 0.3); }

        #watermark {
            position: absolute;
            bottom: 2%;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.3);
            z-index: 10;
            pointer-events: none;
            letter-spacing: 1px;
            transition: opacity 0.5s;
        }

        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            touch-action: none; 
        }
    </style>
</head>
<body>

    <div id="ui-top">
        <h1>🌸 Flower Garden For You</h1>
        <p>Tap or Swipe Anywhere to</p>
        <h2>Plant Flowers</h2>
        <p>or turn on Auto Bloom</p>
    </div>

    <div id="note-container">
        <p class="romantic-note">
            Just wanted to leave a little corner of calm here.<br>
            Hope it made you smile, even if only for a minute. 🌸
        </p>
    </div>

    <div id="ui-bottom">
        <button id="clearBtn">Clear Garden</button>
        <button id="autoBloomBtn">▶ Auto Bloom</button>
    </div>

    <div id="watermark">Made By Manik~</div>

    <canvas id="garden"></canvas>

    <script>
        const canvas = document.getElementById('garden');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let flowers = [];
        let vines = [];
        let fireflies = [];
        let dandelionSeeds = [];
        let autoBloomInterval = null;
        let time = 0;
        
        const palettes = [
            { main: 'rgba(255, 126, 179, 0.8)', glow: '#ff7eb3' }, 
            { main: 'rgba(255, 185, 208, 0.8)', glow: '#ffb9d0' }, 
            { main: 'rgba(168, 230, 207, 0.8)', glow: '#a8e6cf' }, 
            { main: 'rgba(220, 175, 255, 0.8)', glow: '#dcafff' }, 
            { main: 'rgba(255, 211, 132, 0.8)', glow: '#ffd384' }  
        ];

        // --- BULLETPROOF AUDIO LOGIC WITH FORCED IOS UNLOCK ---
        let isMusicPlaying = false;
        const bgm = new Audio('./dandelions.mp3'); 
        bgm.loop = true;
        bgm.volume = 0.5;

        function startMusic() {
            if (!isMusicPlaying) {
                bgm.play().then(() => {
                    isMusicPlaying = true;
                }).catch(err => {
                    console.log("Audio engine bypass triggered:", err);
                });
            }
        }

        // Force iOS core engine to accept the audio context on standard native touch events
        window.addEventListener('touchstart', startMusic, { once: true });
        window.addEventListener('click', startMusic, { once: true });

        // --- PRE-RENDERING CACHE ---
        const preRenderedFlowers = [];
        const cacheSize = 250; 

        function initPreRenders() {
            const dpr = Math.min(window.devicePixelRatio || 1, 3); 
            
            palettes.forEach(palette => {
                for(let v = 0; v < 3; v++) {
                    const pCanvas = document.createElement('canvas');
                    pCanvas.width = cacheSize * dpr;
                    pCanvas.height = cacheSize * dpr;
                    const pCtx = pCanvas.getContext('2d');
                    pCtx.scale(dpr, dpr);
                    
                    const center = cacheSize / 2;
                    const petalCount = Math.floor(Math.random() * 3) + 5;
                    const petalSize = Math.random() * 15 + 35; 

                    pCtx.translate(center, center);
                    
                    pCtx.shadowBlur = 30; 
                    pCtx.shadowColor = palette.glow;
                    pCtx.globalCompositeOperation = 'screen';

                    for (let layer = 0; layer < 2; layer++) {
                        const layerScale = layer === 0 ? 1 : 0.6;
                        const layerPetals = layer === 0 ? petalCount : petalCount - 1;
                        pCtx.fillStyle = layer === 0 ? palette.main : '#ffffff';
                        
                        for (let i = 0; i < layerPetals; i++) {
                            pCtx.save();
                            pCtx.rotate((Math.PI * 2 / layerPetals) * i + (Math.PI / 4));
                            pCtx.scale(layerScale, layerScale);
                            
                            pCtx.beginPath();
                            pCtx.moveTo(0, 0);
                            pCtx.bezierCurveTo(-petalSize / 1.5, -petalSize / 2, -petalSize / 2, -petalSize, 0, -petalSize * 1.2);
                            pCtx.bezierCurveTo(petalSize / 2, -petalSize, petalSize / 1.5, -petalSize / 2, 0, 0);
                            pCtx.fill();
                            pCtx.restore();
                        }
                    }

                    pCtx.beginPath();
                    pCtx.arc(0, 0, 6, 0, Math.PI * 2);
                    pCtx.fillStyle = '#fff9c4';
                    pCtx.shadowBlur = 10;
                    pCtx.shadowColor = '#fff9c4';
                    pCtx.fill();

                    preRenderedFlowers.push(pCanvas);
                }
            });
        }
        initPreRenders();

        class Firefly {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.size = Math.random() * 1.5 + 1;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.angle = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
            }
            update() {
                this.angle += this.wobbleSpeed;
                this.x += this.speedX + Math.sin(this.angle) * 0.2;
                this.y += this.speedY + Math.cos(this.angle) * 0.2;

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(254, 240, 138, 0.08)';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(253, 224, 71, 0.7)';
                ctx.fill();
                ctx.restore();
            }
        }

        class DandelionSeed {
            constructor() {
                this.reset(true);
            }
            reset(randomX = false) {
                this.x = randomX ? Math.random() * window.innerWidth : -50;
                this.y = Math.random() * (window.innerHeight * 0.8);
                this.size = Math.random() * 3 + 4;
                this.speedX = Math.random() * 0.5 + 0.4; 
                this.speedY = (Math.random() - 0.3) * 0.2; 
                this.wobble = Math.random() * 100;
                this.wobbleSpeed = Math.random() * 0.01 + 0.005;
            }
            update() {
                this.wobble += this.wobbleSpeed;
                this.x += this.speedX;
                this.y += this.speedY + Math.sin(this.wobble) * 0.15;

                if (this.x > width + 50 || this.y > height + 50) {
                    this.reset(false);
                }
            }
            draw() {
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 1;
                
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.sin(this.wobble) * 0.1);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-this.size, this.size); 
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0,0); ctx.lineTo(this.size * 0.4, -this.size * 0.2);
                ctx.moveTo(0,0); ctx.lineTo(this.size * 0.2, -this.size * 0.4);
                ctx.moveTo(0,0); ctx.lineTo(-this.size * 0.2, -this.size * 0.4);
                ctx.stroke();
                
                ctx.restore();
            }
        }

        function resize() {
            const dpr = Math.min(window.devicePixelRatio || 1, 3);
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = `${window.innerWidth}px`;
            canvas.style.height = `${window.innerHeight}px`;
            ctx.scale(dpr, dpr);
            width = window.innerWidth;
            height = window.innerHeight;

            fireflies = Array.from({ length: 25 }, () => new Firefly());
            dandelionSeeds = Array.from({ length: 15 }, () => new DandelionSeed());
        }
        window.addEventListener('resize', resize);
        resize();

        function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

        class Flower {
            constructor(x, y) {
                this.startX = x;
                this.targetY = y;
                this.baseY = height + 50; 
                this.maxHeight = this.baseY - y;
                this.stemProgress = 0;
                this.bloomProgress = 0;
                this.cachedImage = preRenderedFlowers[Math.floor(Math.random() * preRenderedFlowers.length)];
                this.swayOffset = Math.random() * 1000;
                this.swaySpeed = Math.random() * 0.02 + 0.01;
                this.staticRotation = Math.random() * Math.PI * 2; 
            }
            update() {
                if (this.stemProgress < 1) this.stemProgress += 0.015;
                else if (this.bloomProgress < 1) this.bloomProgress += 0.008;
            }
            draw() {
                const currentHeight = this.maxHeight * easeOut(this.stemProgress);
                const sway = Math.sin(time * this.swaySpeed + this.swayOffset) * 20 * (currentHeight / this.maxHeight);
                const headX = this.startX + sway;
                const headY = this.baseY - currentHeight;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(this.startX, this.baseY);
                ctx.quadraticCurveTo(this.startX, this.baseY - currentHeight / 2, headX, headY);
                
                const stemGradient = ctx.createLinearGradient(this.startX, this.baseY, headX, headY);
                stemGradient.addColorStop(0, '#1a4a2b');
                stemGradient.addColorStop(1, '#4ade80');
                
                ctx.strokeStyle = stemGradient;
                ctx.lineWidth = 4 * easeOut(this.stemProgress);
                ctx.lineCap = 'round';
                ctx.stroke();

                if (this.stemProgress >= 0.5) {
                    const bloomEase = easeOut(this.bloomProgress);
                    ctx.translate(headX, headY);
                    ctx.rotate(this.staticRotation); 
                    const drawSize = cacheSize * bloomEase;
                    ctx.drawImage(this.cachedImage, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
                }
                ctx.restore();
            }
        }

        class Vine {
            constructor(startX, startY) {
                this.points = [{x: startX, y: startY}];
                this.blooms = [];
                this.lastBloomPoint = {x: startX, y: startY};
                this.lastDrawPoint = {x: startX, y: startY};
            }
            addPoint(x, y) {
                const dx = x - this.lastDrawPoint.x;
                const dy = y - this.lastDrawPoint.y;
                const distToLast = Math.sqrt(dx*dx + dy*dy);
                
                if (distToLast > 12) {
                    this.points.push({x, y});
                    this.lastDrawPoint = {x, y};
                    
                    const bx = x - this.lastBloomPoint.x;
                    const by = y - this.lastBloomPoint.y;
                    const distToBloom = Math.sqrt(bx*bx + by*by);
                    
                    if (distToBloom > 70) {
                        this.blooms.push({
                            x: x, 
                            y: y, 
                            progress: 0,
                            cachedImage: preRenderedFlowers[Math.floor(Math.random() * preRenderedFlowers.length)],
                            rotation: Math.random() * Math.PI * 2
                        });
                        this.lastBloomPoint = {x, y};
                    }
                }
            }
            update() {
                this.blooms.forEach(b => {
                    if (b.progress < 1) b.progress += 0.015;
                });
            }
            draw() {
                if (this.points.length < 2) return;
                
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for(let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                
                ctx.strokeStyle = '#4ade80';
                ctx.shadowColor = '#4ade80';
                ctx.shadowBlur = 10;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                ctx.shadowBlur = 0;

                this.blooms.forEach(b => {
                    const bloomEase = easeOut(b.progress);
                    if (bloomEase > 0.01) {
                        ctx.translate(b.x, b.y);
                        ctx.rotate(b.rotation);
                        const drawSize = cacheSize * bloomEase * 0.8; 
                        ctx.drawImage(b.cachedImage, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
                        ctx.rotate(-b.rotation);
                        ctx.translate(-b.x, -b.y);
                    }
                });
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height); 
            time++;
            
            fireflies.forEach(f => { f.update(); f.draw(); });
            flowers.forEach(flower => { flower.update(); flower.draw(); });
            vines.forEach(vine => { vine.update(); vine.draw(); });
            dandelionSeeds.forEach(s => { s.update(); s.draw(); });

            requestAnimationFrame(animate);
        }

        const uiTop = document.getElementById('ui-top');
        const uiBottom = document.getElementById('ui-bottom');
        const noteContainer = document.getElementById('note-container');
        const watermark = document.getElementById('watermark');

        function revealSecretNote() {
            uiTop.style.opacity = '0';          
            noteContainer.style.opacity = '1';  
            uiBottom.style.opacity = '0.1';     
            watermark.style.opacity = '0.1';
        }

        let isDrawing = false;
        let currentVine = null;
        let startPos = {x: 0, y: 0};

        canvas.addEventListener('pointerdown', (e) => {
            startMusic(); 
            revealSecretNote();
            isDrawing = true;
            startPos = {x: e.clientX, y: e.clientY};
            currentVine = new Vine(e.clientX, e.clientY);
            vines.push(currentVine);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            currentVine.addPoint(e.clientX, e.clientY);
        });

        window.addEventListener('pointerup', (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            
            const dx = e.clientX - startPos.x;
            const dy = e.clientY - startPos.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < 10) {
                vines.pop(); 
                flowers.push(new Flower(e.clientX, e.clientY)); 
            }
            currentVine = null;
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            flowers = [];
            vines = []; 
            uiTop.style.opacity = '1';
            noteContainer.style.opacity = '0';
            uiBottom.style.opacity = '1';
            watermark.style.opacity = '1';
        });

        document.getElementById('autoBloomBtn').addEventListener('click', (e) => {
            startMusic(); 
            revealSecretNote();
            const btn = e.target;
            if (autoBloomInterval) {
                clearInterval(autoBloomInterval);
                autoBloomInterval = null;
                btn.innerText = '▶ Auto Bloom';
                btn.style.color = '#fff';
            } else {
                btn.innerText = '⏸ Stop Bloom';
                btn.style.color = '#ffb3c6';
                autoBloomInterval = setInterval(() => {
                    const randomX = Math.random() * width;
                    const randomY = height - (Math.random() * (height * 0.5) + 150);
                    flowers.push(new Flower(randomX, randomY));
                }, 500); 
            }
        });

        animate();
    </script>
</body>
</html>
